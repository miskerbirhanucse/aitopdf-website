<!doctype html>
<html>
  <head>
    <title>Test Extension Sync</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 500px;
        margin: 60px auto;
      }
      button {
        padding: 12px 24px;
        margin: 8px 4px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-green {
        background: #4caf50;
        color: white;
      }
      .btn-red {
        background: #f44336;
        color: white;
      }
      .btn-blue {
        background: #2196f3;
        color: white;
      }
      pre {
        background: #111;
        color: #0f0;
        padding: 16px;
        border-radius: 8px;
        margin-top: 16px;
        min-height: 100px;
        font-size: 13px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h2>Extension Sync Test</h2>
    <p>Make sure the extension is installed and loaded.</p>

    <button class="btn-green" id="activate">Activate Pro</button>
    <button class="btn-red" id="deactivate">Deactivate</button>
    <button class="btn-blue" id="status">Check Status</button>

    <pre id="output">Click a button to test...</pre>

    <script>
      // ═══ PUT YOUR EXTENSION ID HERE ═══
      const EXT_ID = "YOUR_DEV_EXTENSION_ID";

      const output = document.getElementById("output");
      function log(text) {
        output.textContent += "\n" + text;
      }
      function clear() {
        output.textContent = "";
      }

      // Test 1: Activate
      document.getElementById("activate").addEventListener("click", () => {
        clear();
        log("Sending activate message...");
        log("Extension ID: " + EXT_ID);
        log("Email: yafettpap@gmail.com");
        log("");

        try {
          chrome.runtime.sendMessage(
            EXT_ID,
            { action: "activate", email: "yafettpap@gmail.com" },
            (response) => {
              if (chrome.runtime.lastError) {
                log("❌ Error: " + chrome.runtime.lastError.message);
                log("");
                log("Possible reasons:");
                log("1. Extension ID is wrong");
                log("2. Extension not loaded");
                log("3. externally_connectable not set");
                log("4. Extension needs reload");
                return;
              }
              log("✅ Response: " + JSON.stringify(response, null, 2));
              log("");
              if (response?.success) {
                log("Extension synced! Now open the extension popup.");
                log("It should show PRO badge.");
              }
            },
          );
        } catch (e) {
          log("❌ Exception: " + e.message);
          log("chrome.runtime.sendMessage not available");
          log("Are you on HTTPS?");
        }
      });

      // Test 2: Deactivate
      document.getElementById("deactivate").addEventListener("click", () => {
        clear();
        log("Sending deactivate message...");

        try {
          chrome.runtime.sendMessage(
            EXT_ID,
            { action: "deactivate" },
            (response) => {
              if (chrome.runtime.lastError) {
                log("❌ Error: " + chrome.runtime.lastError.message);
                return;
              }
              log("✅ Response: " + JSON.stringify(response, null, 2));
              log("Extension deactivated. Open popup — should show FREE.");
            },
          );
        } catch (e) {
          log("❌ Exception: " + e.message);
        }
      });

      // Test 3: Check status
      document.getElementById("status").addEventListener("click", () => {
        clear();
        log("Checking extension status...");

        try {
          chrome.runtime.sendMessage(
            EXT_ID,
            { action: "getStatus" },
            (response) => {
              if (chrome.runtime.lastError) {
                log("❌ Error: " + chrome.runtime.lastError.message);
                return;
              }
              log("✅ Status: " + JSON.stringify(response, null, 2));
            },
          );
        } catch (e) {
          log("❌ Exception: " + e.message);
        }
      });
    </script>
  </body>
</html>
